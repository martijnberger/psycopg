name: Lint

on:
  push:
    # This should disable running the workflow on tags, according to the
    # on.<push|pull_request>.<branches|tags> GitHub Actions docs.
    branches:
      - "**"
  pull_request:
  schedule:
    - cron: '18 6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    if: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync lint and docs dependencies
        run: uv sync --group docs

      - name: Lint codebase
        run: uv run pre-commit run -a --color=always

      - name: Check for sync/async inconsistencies
        run: uv run ./tools/async_to_sync.py --check --all

      - name: Install requirements to generate docs
        run: sudo apt-get install -y libgeos-dev

      - name: Check documentation
        run: uv run sphinx-build -W -T -b html docs docs/_build/html
